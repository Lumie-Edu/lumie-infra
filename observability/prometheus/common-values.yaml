# Common chart values for prometheus
common:
  name: prometheus

  # Disable deployment (external chart creates it)
  deployment:
    enabled: false

  service:
    enabled: false

  ingress:
    enabled: false

  # Vault Static Secrets (VSO)
  vaultStaticSecrets:
    # PostgreSQL password for postgres-exporter
    - name: postgresql-vss
      path: storage/postgresql
      destination:
        name: postgresql-password
        transformation:
          templates:
            password: "{{ .Secrets.POSTGRES_PASSWORD }}"

    # Thanos object store credentials
    - name: minio-vss
      path: bootstrap/minio
      destination:
        name: thanos-objstore-secret
        transformation:
          templates:
            objstore.yml: |
              type: S3
              config:
                bucket: thanos
                endpoint: minio.minio.svc.cluster.local:9000
                access_key: {{ .Secrets.MINIO_ROOT_USER }}
                secret_key: {{ .Secrets.MINIO_ROOT_PASSWORD }}
                insecure: true

    # Zot registry credentials for image pull
    - name: zot-vss
      path: bootstrap/zot
      destination:
        name: zot-registry-credentials
        type: kubernetes.io/dockerconfigjson
        transformation:
          templates:
            .dockerconfigjson: '{"auths":{"zot.lumie-infra.com":{"username":"{{ .Secrets.ZOT_USERNAME }}","password":"{{ .Secrets.ZOT_PASSWORD }}","auth":"{{ printf "%s:%s" .Secrets.ZOT_USERNAME .Secrets.ZOT_PASSWORD | b64enc }}"}}}'

  # ServiceMonitor for alertmanager (cross-namespace monitoring)
  serviceMonitor:
    enabled: true
    name: alertmanager
    labels:
      release: prometheus
    namespaceSelector:
      matchNames:
        - alertmanager
    selector:
      matchLabels:
        app.kubernetes.io/instance: alertmanager
        app.kubernetes.io/name: alertmanager
    endpoints:
      - port: http
        path: /metrics
        scheme: http
        interval: 60s
        relabelings:
          - targetLabel: cluster
            replacement: "mayne-cluster"
          - sourceLabels: [__meta_kubernetes_service_name]
            regex: alertmanager-headless
            action: drop

  # PrometheusRules - defined in helm-values.yaml via additionalPrometheusRulesMap
