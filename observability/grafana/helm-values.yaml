# Grafana Helm Values
# Chart: https://github.com/grafana/helm-charts/tree/main/charts/grafana

# Image configuration - use zot registry
image:
  registry: zot.lumie-infra.com
  repository: grafana/grafana
  tag: "12.3.2"

fullnameOverride: grafana

replicas: 1

# Use existing secret to prevent Helm from generating random admin-password
admin:
  existingSecret: grafana-db-app
  userKey: username
  passwordKey: password

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: grafana
        topologyKey: kubernetes.io/hostname

persistence:
  enabled: false

# PostgreSQL database - credentials from Vault
env:
  GF_DATABASE_TYPE: postgres
  GF_DATABASE_NAME: grafana
  GF_DATABASE_SSL_MODE: disable

envValueFrom:
  GF_DATABASE_HOST:
    secretKeyRef:
      name: grafana-db-app
      key: host
  GF_DATABASE_PORT:
    secretKeyRef:
      name: grafana-db-app
      key: port
  GF_DATABASE_USER:
    secretKeyRef:
      name: grafana-db-app
      key: username
  GF_DATABASE_PASSWORD:
    secretKeyRef:
      name: grafana-db-app
      key: password

initChownData:
  enabled: false

podSecurityContext:
  fsGroup: 472
  fsGroupChangePolicy: "Always"

# Resource settings (VPA recommended, no CPU limit for stability)
resources:
  requests:
    cpu: 23m
    memory: 260Mi
  limits:
    memory: 260Mi

service:
  type: ClusterIP
  port: 80

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Thanos
      type: prometheus
      access: proxy
      url: http://thanos-query.thanos.svc.cluster.local:9090
      isDefault: true
      editable: true
      jsonData:
        timeInterval: "60s"
    - name: Prometheus
      type: prometheus
      access: proxy
      url: http://prometheus-kube-prometheus-prometheus.prometheus.svc.cluster.local:9090
      isDefault: false
      editable: true
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.loki.svc.cluster.local:3100
      editable: true
    - name: Alertmanager
      type: alertmanager
      access: proxy
      url: http://alertmanager.alertmanager.svc.cluster.local:9093
      editable: true
      jsonData:
        implementation: prometheus
    - name: Tempo
      type: tempo
      access: proxy
      url: http://tempo.tempo.svc.cluster.local:3100
      editable: true

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
    - name: default
      orgId: 1
      folder: ""
      type: file
      disableDeletion: false
      editable: false
      options:
        path: /var/lib/grafana/dashboards

extraConfigmapMounts:
- name: dashboard-argocd
  mountPath: /var/lib/grafana/dashboards/argocd.json
  configMap: grafana-dashboard-argocd
  subPath: argocd.json
  readOnly: true
- name: dashboard-blackbox-exporter
  mountPath: /var/lib/grafana/dashboards/blackbox-exporter-http-prober.json
  configMap: grafana-dashboard-blackbox-exporter
  subPath: blackbox-exporter-http-prober.json
  readOnly: true
- name: dashboard-certmanager
  mountPath: /var/lib/grafana/dashboards/certmanager.json
  configMap: grafana-dashboard-certmanager
  subPath: certmanager.json
  readOnly: true
- name: dashboard-cloudnativepg
  mountPath: /var/lib/grafana/dashboards/cloudnativepg.json
  configMap: grafana-dashboard-cloudnativepg
  subPath: cloudnativepg.json
  readOnly: true
- name: dashboard-coredns
  mountPath: /var/lib/grafana/dashboards/coredns.json
  configMap: grafana-dashboard-coredns
  subPath: coredns.json
  readOnly: true
- name: dashboard-falco
  mountPath: /var/lib/grafana/dashboards/falco.json
  configMap: grafana-dashboard-falco
  subPath: falco.json
  readOnly: true
- name: dashboard-krci-tekton
  mountPath: /var/lib/grafana/dashboards/krci-tekton-overview.json
  configMap: grafana-dashboard-krci-tekton
  subPath: krci-tekton-overview.json
  readOnly: true
- name: dashboard-logs
  mountPath: /var/lib/grafana/dashboards/logs.json
  configMap: grafana-dashboard-logs
  subPath: logs.json
  readOnly: true
- name: dashboard-loki
  mountPath: /var/lib/grafana/dashboards/loki.json
  configMap: grafana-dashboard-loki
  subPath: loki.json
  readOnly: true
- name: dashboard-main
  mountPath: /var/lib/grafana/dashboards/main.json
  configMap: grafana-dashboard-main
  subPath: main.json
  readOnly: true
- name: dashboard-minio
  mountPath: /var/lib/grafana/dashboards/minio.json
  configMap: grafana-dashboard-minio
  subPath: minio.json
  readOnly: true
- name: dashboard-namespaces
  mountPath: /var/lib/grafana/dashboards/namespaces.json
  configMap: grafana-dashboard-namespaces
  subPath: namespaces.json
  readOnly: true
- name: dashboard-nodeexporter
  mountPath: /var/lib/grafana/dashboards/nodeexporter.json
  configMap: grafana-dashboard-nodeexporter
  subPath: nodeexporter.json
  readOnly: true
- name: dashboard-opentelemetry-collector
  mountPath: /var/lib/grafana/dashboards/opentelemetry-collector.json
  configMap: grafana-dashboard-opentelemetry-collector
  subPath: opentelemetry-collector.json
  readOnly: true
- name: dashboard-pods
  mountPath: /var/lib/grafana/dashboards/pods.json
  configMap: grafana-dashboard-pods
  subPath: pods.json
  readOnly: true
- name: dashboard-traefik
  mountPath: /var/lib/grafana/dashboards/traefik.json
  configMap: grafana-dashboard-traefik
  subPath: traefik.json
  readOnly: true
- name: dashboard-trivy
  mountPath: /var/lib/grafana/dashboards/trivy.json
  configMap: grafana-dashboard-trivy
  subPath: trivy.json
  readOnly: true

grafana.ini:
  server:
    root_url: "https://grafana.lumie-infra.com"
  auth.anonymous:
    enabled: true
    org_role: Viewer
  security:
    allow_embedding: true
  auth.basic:
    enabled: false
  auth:
    disable_login_form: true
    disable_signout_menu: true
  news:
    news_feed_enabled: false

# Ingress disabled - access via Teleport (teleport0213.kro.kr)
ingress:
  enabled: false

# DB credentials provided by VSO secret (grafana-db-app) pointing to shared infra-db cluster
