apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pgbouncer-prod
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
  - repoURL: https://icoretech.github.io/helm
    chart: pgbouncer
    targetRevision: 4.1.0
    helm:
      valueFiles:
      - $values/storage/pgbouncer/base-values.yaml
      - $values/storage/pgbouncer/overlays/prod-values.yaml
  - repoURL: https://github.com/Lumie-Edu/lumie-infra.git
    targetRevision: main
    ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: lumie-backend
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
    - CreateNamespace=false
  revisionHistoryLimit: 10
