# Redis Sentinel configuration for LUMIE cache
# Bitnami Redis Helm chart

global:
  imageRegistry: zot.lumie-infra.com
  security:
    allowInsecureImages: true

image:
  repository: bitnamilegacy/redis
  tag: "8.2.1-debian-12-r0"

# Replication architecture with Sentinel
architecture: replication

# Disable authentication for internal cluster communication
auth:
  enabled: false

# Master configuration
master:
  persistence:
    enabled: false
  resources:
    requests:
      memory: 128Mi
      cpu: 20m
    limits:
      memory: 128Mi

# Replica configuration
replica:
  replicaCount: 2
  persistence:
    enabled: false
  resources:
    requests:
      memory: 128Mi
      cpu: 20m
    limits:
      memory: 128Mi

# Sentinel configuration for HA
sentinel:
  enabled: true
  image:
    repository: bitnamilegacy/redis-sentinel
    tag: "8.2.1-debian-12-r0"
  quorum: 2
  downAfterMilliseconds: 5000
  failoverTimeout: 60000
  resources:
    requests:
      memory: 64Mi
      cpu: 20m
    limits:
      memory: 64Mi

# Metrics for monitoring
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: lumie-cache
  resources:
    requests:
      cpu: 10m
      memory: 192Mi
    limits:
      memory: 192Mi
