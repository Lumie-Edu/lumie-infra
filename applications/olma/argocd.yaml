apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: olma
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Lumie-Edu/lumie-infra.git
    targetRevision: main
    path: applications/olma
  destination:
    server: https://kubernetes.default.svc
    namespace: olma
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
    - CreateNamespace=true
  revisionHistoryLimit: 10
