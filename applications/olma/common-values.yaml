# OLma - 백엔드 + CNPG DB (단일 네임스페이스)

common:
  name: olma-backend
  namespace: olma

  # 백엔드 Deployment
  deployment:
    enabled: true

  replicaCount: 1

  image:
    registry: zot.lumie-infra.com
    repository: applications/olma-backend
    tag: "initial"
    pullPolicy: IfNotPresent

  ports:
    - name: http
      containerPort: 8080
      protocol: TCP

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

  env:
    - name: SPRING_PROFILES_ACTIVE
      value: "prod"
    - name: DB_HOST
      value: "olma-db-db-rw.olma.svc"
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: "olma"
    - name: DB_USERNAME
      valueFrom:
        secretKeyRef:
          name: olma-db-db-app
          key: username
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: olma-db-db-app
          key: password

  resources:
    requests:
      cpu: 30m
      memory: 384Mi
    limits:
      memory: 384Mi

  healthCheck:
    enabled: true
    port: http
    livenessProbe:
      path: /actuator/health/liveness
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      path: /actuator/health/readiness
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    startupProbe:
      path: /actuator/health
      periodSeconds: 5
      failureThreshold: 30

  service:
    enabled: true
    type: ClusterIP
    port: 8080
    ports:
      - name: http
        port: 8080
        targetPort: http
        protocol: TCP

  ingress:
    enabled: false

  serviceMonitor:
    enabled: false

  # CNPG Database
  database:
    enabled: true
    clusterName: olma-db
    instances: 1
    version: "17"
    name: olma
    owner: olma
    encoding: UTF8
    localeCollate: C
    localeCType: C
    storage:
      class: local-path
      size: 5Gi
    resources:
      memory: 256Mi
      cpu: 50m
    postgresql:
      parameters:
        max_connections: "50"
        shared_buffers: "64MB"
    backup:
      enabled: false
