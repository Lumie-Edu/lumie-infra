apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmGlobals:
  chartHome: ../../charts

helmCharts:
  - name: common
    releaseName: olma
    namespace: olma
    valuesFile: common-values.yaml

resources:
  - manifests/frontend-deployment.yaml
  - manifests/frontend-service.yaml
  - manifests/ingress.yaml
