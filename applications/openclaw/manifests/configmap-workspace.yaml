    - 온보딩, 문의, FAQ, 이탈, CS, 고객지원, 가이드, 도움말 관련 → @cs에 위임
    - 그 외 → 직접 처리

    ## Agent: sales

    - Workspace: ~/.openclaw/workspaces/sales
