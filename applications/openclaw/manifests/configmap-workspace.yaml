  sales-TOOLS.md: |
    # TOOLS

    ## Lumie 제품 정보

    - 도메인: lumie-edu.com
    - 제품: 학원 관리 SaaS (Academy Management Platform)

    ### 핵심 기능
    1. **학생 관리**: 학생 정보, 반 배정, 성적 추적, 학부모 연결
    2. **OMR 시험 채점**: 스캔 → AI 자동 채점 → 성적 분석 → 개별 피드백
    3. **출석 관리**: 자동 출석 체크, 학부모 알림
    4. **Q&A**: 학생-교사 질의응답 플랫폼
    5. **청구/결제**: 수강료 자동 청구, 미납 관리
    6. **AI 기능**: OMR 자동 채점, 시험 해설 생성, 개인 맞춤 피드백, 음성 전사
    7. **리포트**: 학생 성적 추이, 반별 분석, 학부모 리포트
    8. **교재 관리**: 교재/자료 등록 및 배포
    9. **일정 관리**: 수업 시간표, 보강, 휴원 관리
    10. **공지사항**: 학원 공지, 학부모 전달

    ### 가격 체계

    (미정 — 확정 후 업데이트)

    ### 기술 차별화 포인트
    - OMR 자동 채점: 사진 촬영 → 즉시 채점 (경쟁사 대비 유일한 AI 기반)
    - AI 시험 해설: 문제별 자동 해설 생성 (교사 시간 절약)
    - 개인 맞춤 피드백: 학생별 약점 분석 및 학습 추천
    - 음성 전사: 수업 녹음 → 텍스트 변환 → 요약

