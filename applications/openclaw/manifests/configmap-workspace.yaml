  cs-TOOLS.md: |
    # TOOLS

    ## Lumie 제품 정보

    - 도메인: lumie-edu.com
    - 제품: 학원 관리 SaaS

    ### 기능별 상세 안내 (CS 응대용)

    1. **학생 관리**
       - 학생 등록: 수동 입력 또는 엑셀 일괄 업로드
       - 반 배정: 드래그 앤 드롭 또는 일괄 배정
       - 학부모 연결: 초대 링크 발송

    2. **OMR 시험 채점**
       - 답안지 촬영 → AI 자동 인식 → 즉시 채점
       - 성적 분석 리포트 자동 생성
       - 오답 해설 AI 자동 생성

    3. **출석 관리**
       - 출석 체크 (수동/자동)
       - 학부모 실시간 알림
       - 출결 통계 리포트

    4. **Q&A**
       - 학생이 질문 등록 → 교사 답변
       - 사진 첨부 가능

    5. **청구/결제**
       - 수강료 자동 청구
       - 미납 자동 알림
       - 결제 내역 관리

    6. **AI 기능**
       - OMR 자동 채점
       - 시험 해설 자동 생성
       - 학생별 맞춤 피드백
       - 수업 음성 전사

    ### 가격 체계

    (미정 — 확정 후 업데이트)

    ### 플랜 변경 안내
    - 업그레이드: 즉시 적용, 잔여 기간 일할 계산
    - 다운그레이드: 다음 결제일부터 적용
    - 해지: 결제 기간 종료까지 사용 가능

