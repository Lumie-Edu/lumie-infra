apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-config
  namespace: openclaw
data:
  openclaw.json: |
    {
      "gateway": {
        "bind": "lan",
        "trustedProxies": ["10.42.0.0/16"],
        "auth": {
          "mode": "trusted-proxy",
          "trustedProxy": {
            "userHeader": "Teleport-Jwt-Assertion"
          }
        },
        "controlUi": {
          "dangerouslyAllowHostHeaderOriginFallback": true,
          "dangerouslyDisableDeviceAuth": true
        }
      },
      "channels": {
        "telegram": {
          "enabled": true,
          "botToken": "${TELEGRAM_BOT_TOKEN}"
        }
      },
      "agents": {
        "defaults": {
          "model": {
            "primary": "deepseek/deepseek-chat"
          }
        },
        "list": [
          { "id": "main" },
          {
            "id": "health",
            "name": "health",
            "workspace": "/home/node/.openclaw/workspaces/health",
            "agentDir": "/home/node/.openclaw/agents/health/agent",
            "model": "deepseek/deepseek-chat"
          }
        ]
      },
      "tools": {
        "agentToAgent": {
          "enabled": true,
          "allow": ["main", "health"]
        }
      },
      "models": {
        "providers": {
          "deepseek": {
            "baseUrl": "https://api.deepseek.com/v1",
            "apiKey": "${DEEPSEEK_API_KEY}",
            "api": "openai-completions",
            "models": [
              { "id": "deepseek-chat", "name": "DeepSeek V3" },
              { "id": "deepseek-reasoner", "name": "DeepSeek R1" }
            ]
          }
        }
      }
    }
