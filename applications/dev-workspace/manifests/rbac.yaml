apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-workspace
  namespace: dev-workspace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dev-workspace-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: dev-workspace
  namespace: dev-workspace
