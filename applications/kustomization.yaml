apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Self-reference for App of Apps pattern
  - application.yaml

  # ArgoCD self-management (installed by Ansible, managed by GitOps)
  - argocd/argocd.yaml

  - lumie/document/argocd.yaml
  - umami/argocd.yaml
  - headlamp/argocd.yaml
  - openclaw/argocd.yaml
  - outline/argocd.yaml


  # Tekton CI/CD
  - tekton/pipeline/argocd.yaml
  - tekton/triggers/argocd.yaml
  - tekton/dashboard/argocd.yaml
  - tekton/ci-cd/argocd.yaml

  # LUMIE Platform
  - lumie/argocd.yaml
  - lumie/develop/argocd.yaml

  # LUMIE Backend (unified monolith)
  - lumie/backend/lumie-backend/argocd.yaml

  # LUMIE Frontend
  - lumie/frontend/argocd.yaml

  # LUMIE Worker (ai-svc is now part of lumie-backend monolith)
  - lumie/worker/analysis-svc/argocd.yaml
  - lumie/worker/grading-svc/argocd.yaml
  - lumie/worker/report-svc/argocd.yaml
