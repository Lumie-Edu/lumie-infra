# Dev-only RabbitMQ (prevents queue conflicts with prod)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-dev
  namespace: lumie-dev
  labels:
    app: rabbitmq-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-dev
  template:
    metadata:
      labels:
        app: rabbitmq-dev
    spec:
      containers:
        - name: rabbitmq
          image: zot.lumie-infra.com/library/rabbitmq:4.1-management
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "lumie"
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: lumie-dev-rabbitmq-secrets
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-dev
  namespace: lumie-dev
spec:
  selector:
    app: rabbitmq-dev
  ports:
    - name: amqp
      port: 5672
      targetPort: amqp
    - name: management
      port: 15672
      targetPort: management
