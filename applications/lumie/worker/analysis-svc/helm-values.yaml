# Analysis Service Helm Values
# AI 모의고사 분석 서비스 (Python FastAPI + GPT-4o-mini)

common:
  name: analysis-svc
  image:
    registry: zot.lumie-infra.com
    repository: applications/analysis-svc
    tag: "5f8f594e"
    pullPolicy: Always
  replicaCount: 1
  containerPort: 8000

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001

  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  service:
    enabled: true
    type: ClusterIP
    port: 80
    annotations: {}
  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: lumie-edu.com
        paths:
          - path: /api/analysis
            pathType: Prefix
  # Environment variables
  env:
    - name: HOST
      value: "0.0.0.0"
    - name: PORT
      value: "8000"
    - name: LLM_MODEL
      value: "deepseek-chat"
    - name: LLM_BASE_URL
      value: "https://api.deepseek.com/v1"
  # Secret env from Vault
  envFrom:
    - secretRef:
        name: analysis-svc-secrets
  # Vault Static Secret for LLM API Key
  vaultStaticSecrets:
    - name: analysis-svc-vss
      path: tokens
      destination:
        name: analysis-svc-secrets
        transformation:
          templates:
            LLM_API_KEY: "{{ .Secrets.OPENAI_API_KEY }}"
  # Resource settings
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 256Mi
  healthCheck:
    enabled: true
    path: /health
    startupProbe:
      periodSeconds: 10
      failureThreshold: 30
    livenessProbe:
      initialDelaySeconds: 0
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readinessProbe:
      initialDelaySeconds: 0
      periodSeconds: 10
      timeoutSeconds: 10
  externalSecret:
    enabled: false
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
