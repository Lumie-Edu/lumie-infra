apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lumie-frontend-main
  namespace: lumie-frontend
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    konghq.com/plugins: lumie-cors
spec:
  ingressClassName: kong
  tls:
    - hosts:
        - lumie-edu.com
        - www.lumie-edu.com
      secretName: lumie-frontend-tls
  rules:
    - host: lumie-edu.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lumie-frontend
                port:
                  number: 3000
