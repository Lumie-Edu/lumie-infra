# Lumie Dev - Strip API prefix middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: lumie-dev
spec:
  stripPrefix:
    prefixes:
      - /api/tenant
      - /api/auth
      - /api/academy
      - /api/admin
      - /api/exam
      - /api/content
      - /api/attendance
      - /api/billing
      - /api/file
      - /api/ai
      - /api/grading
---
# Lumie Dev - Public API Routes (No JWT required)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lumie-dev-api-public
  namespace: lumie-dev
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: lumie-dev-strip-api-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - dev.lumie-edu.com
      secretName: lumie-dev-tls
  rules:
    - host: dev.lumie-edu.com
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: lumie-backend
                port:
                  number: 8080
---
# Lumie Dev - Protected API Routes (JWT required)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lumie-dev-api-protected
  namespace: lumie-dev
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: lumie-dev-strip-api-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - dev.lumie-edu.com
      secretName: lumie-dev-tls
  rules:
    - host: dev.lumie-edu.com
      http:
        paths:
          - path: /api/tenant
            pathType: Prefix
            backend:
              service:
                name: lumie-backend
                port:
                  number: 8080
          - path: /api/academy
            pathType: Prefix
            backend:
              service:
                name: lumie-backend
                port:
                  number: 8080
          - path: /api/billing
            pathType: Prefix
            backend:
              service:
                name: lumie-backend
                port:
                  number: 8080
          - path: /api/exam
            pathType: Prefix
            backend:
              service:
                name: lumie-backend
                port:
                  number: 8080
          - path: /api/content
            pathType: Prefix
            backend:
              service:
                name: lumie-backend
                port:
                  number: 8080
          - path: /api/file
            pathType: Prefix
            backend:
              service:
                name: lumie-backend
                port:
                  number: 8080
          - path: /api/grading
            pathType: Prefix
            backend:
              service:
                name: grading-svc
                port:
                  number: 8000
          - path: /api/admin
            pathType: Prefix
            backend:
              service:
                name: lumie-backend
                port:
                  number: 8080
          - path: /api/attendance
            pathType: Prefix
            backend:
              service:
                name: lumie-backend
                port:
                  number: 8080
          - path: /api/ai
            pathType: Prefix
            backend:
              service:
                name: lumie-backend
                port:
                  number: 8080
