apiVersion: v1
kind: Service
metadata:
  name: dev-workspace
  namespace: lumie-dev
spec:
  type: ClusterIP
  selector:
    app: dev-workspace
  ports:
  - name: tilt-ui
    port: 10350
    targetPort: tilt-ui
    protocol: TCP
  - name: agents
    port: 3000
    targetPort: agents
    protocol: TCP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dev-workspace-data
  namespace: lumie-dev
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 30Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-workspace
  namespace: lumie-dev
  labels:
    app: dev-workspace
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: dev-workspace
  template:
    metadata:
      labels:
        app: dev-workspace
    spec:
      serviceAccountName: dev-workspace
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: fix-permissions
        image: zot.lumie-infra.com/library/docker:dind
        command: ["sh", "-c", "chown -R 1000:1000 /home/ubuntu && chmod 700 /home/ubuntu/.ssh 2>/dev/null && chmod 600 /home/ubuntu/.ssh/id_ed25519 /home/ubuntu/.ssh/config 2>/dev/null || true"]
        volumeMounts:
        - name: data
          mountPath: /home/ubuntu
        securityContext:
          runAsUser: 0
        resources:
          requests:
            cpu: 50m
            memory: 50Mi
          limits:
            memory: 50Mi
      containers:
      - name: dev
        image: zot.lumie-infra.com/dev/dev-workspace:latest
        command: ["sleep", "infinity"]
        ports:
        - name: tilt-ui
          containerPort: 10350
          protocol: TCP
        env:
        - name: HOME
          value: "/home/ubuntu"
        - name: DOCKER_HOST
          value: "tcp://localhost:2375"
        - name: TZ
          value: "Asia/Seoul"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            memory: 4Gi
        volumeMounts:
        - name: data
          mountPath: /home/ubuntu
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      - name: agents
        image: zot.lumie-infra.com/dev/agents:latest
        ports:
        - name: agents
          containerPort: 3000
          protocol: TCP
        env:
        - name: HOME
          value: "/home/ubuntu"
        - name: PORT
          value: "3000"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 128Mi
        volumeMounts:
        - name: data
          mountPath: /home/ubuntu
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      - name: dind
        image: zot.lumie-infra.com/library/docker:dind
        env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 512Mi
        volumeMounts:
        - name: docker-data
          mountPath: /var/lib/docker
        securityContext:
          privileged: true
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: dev-workspace-data
      - name: docker-data
        emptyDir: {}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/master
                operator: DoesNotExist
