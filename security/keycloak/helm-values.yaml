# Keycloak Helm Values (codecentric/keycloakx)
# Realms: infra (developer SSO), lumie (prod social login), lumie-dev (dev social login)

# Image - Zot registry (quay:keycloak/** mapped)
image:
  repository: zot.lumie-infra.com/keycloak/keycloak
  tag: "26.5.4"

# Start Keycloak in production mode
command:
  - "/opt/keycloak/bin/kc.sh"
args:
  - "start"
  - "--import-realm"

# Startup probe - Keycloak needs time to build optimized config on first start
startupProbe: |
  httpGet:
    path: '/health'
    port: http-internal
    scheme: HTTP
  initialDelaySeconds: 60
  timeoutSeconds: 1
  failureThreshold: 120
  periodSeconds: 5

# Proxy - behind Kong reverse proxy
proxy:
  enabled: true
  mode: xforwarded

http:
  relativePath: /

# Hostname
extraEnv: |
  - name: KC_HOSTNAME
    value: "auth.lumie-edu.com"
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_VAULT
    value: "file"
  - name: KC_VAULT_DIR
    value: "/vault/secrets"
  - name: KEYCLOAK_ADMIN
    value: admin
  - name: KEYCLOAK_ADMIN_PASSWORD
    valueFrom:
      secretKeyRef:
        name: keycloak-secrets
        key: KEYCLOAK_ADMIN_PASSWORD

# External PostgreSQL (shared infra-db cluster)
database:
  vendor: postgres
  hostname: infra-db-rw.infra-db.svc.cluster.local
  port: 5432
  database: keycloak
  username: keycloak
  existingSecret: keycloak-db-bootstrap
  existingSecretKey: password

# DB readiness check
dbchecker:
  enabled: true
  image:
    repository: zot.lumie-infra.com/library/busybox
    tag: "1.37"

# Resources (VPA 기반 조정 예정)
resources:
  requests:
    cpu: 100m
    memory: 1Gi
  limits:
    memory: 1Gi

# Disable anti-affinity (single replica)
affinity: ""

# Realm import volume
extraVolumes: |
  - name: realm-import
    configMap:
      name: keycloak-realm-import
  - name: vault-secrets
    secret:
      secretName: keycloak-oauth-secrets

extraVolumeMounts: |
  - name: realm-import
    mountPath: /opt/keycloak/data/import
    readOnly: true
  - name: vault-secrets
    mountPath: /vault/secrets
    readOnly: true

# Disable built-in ingress (access via Teleport only)
ingress:
  enabled: false

# Metrics & Health
metrics:
  enabled: true
health:
  enabled: true
serviceMonitor:
  enabled: true
