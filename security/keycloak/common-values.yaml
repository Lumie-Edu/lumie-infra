  # Vault Static Secrets (VSO)
  vaultStaticSecrets:
    # DB credential secret (password for shared infra-db)
    - name: keycloak-db-bootstrap-static
      path: infrastructure/postgresql
      destination:
        name: keycloak-db-bootstrap
        transformation:
          templates:
            username: keycloak
            password: "{{ .Secrets.POSTGRES_PASSWORD }}"
      rolloutRestartTargets:
        - kind: StatefulSet
          name: keycloak

    # Keycloak admin password
    - name: keycloak-secrets-static
      path: infrastructure/keycloak
      destination:
        name: keycloak-secrets
        transformation:
          templates:
            KEYCLOAK_ADMIN_PASSWORD: "{{ .Secrets.KEYCLOAK_ADMIN_PASSWORD }}"
      rolloutRestartTargets:
        - kind: StatefulSet
          name: keycloak

    # OAuth secrets for Keycloak vault provider (IdP credentials)
    - name: keycloak-oauth-secrets-static
      path: tokens
      destination:
        name: keycloak-oauth-secrets
        transformation:
          templates:
            GOOGLE_CLIENT_ID: "{{ .Secrets.GOOGLE_CLIENT_ID }}"
            GOOGLE_CLIENT_SECRET: "{{ .Secrets.GOOGLE_CLIENT_SECRET }}"
            KAKAO_CLIENT_ID: "{{ .Secrets.KAKAO_CLIENT_ID }}"
            KAKAO_CLIENT_SECRET: "{{ .Secrets.KAKAO_CLIENT_SECRET }}"
            KEYCLOAK_LUMIE_CLIENT_SECRET: "{{ .Secrets.KEYCLOAK_LUMIE_CLIENT_SECRET }}"
      rolloutRestartTargets:
        - kind: StatefulSet
          name: keycloak

  # CNPG Database disabled - using shared infra-db cluster
  database:
    enabled: false
