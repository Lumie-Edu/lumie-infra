# Common chart values for keycloak

common:
  name: keycloak

  # Disable deployment (external chart creates it)
  deployment:
    enabled: false

  service:
    enabled: false

  # Main UI via Teleport only
  ingress:
    enabled: false

  # External ingress for OIDC (browsers need direct access)
  additionalIngresses:
    - name: auth
      serviceName: keycloak-keycloakx-http
      servicePort: 80
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: auth.lumie-edu.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: auth-keycloak-tls
          hosts:
            - auth.lumie-edu.com

