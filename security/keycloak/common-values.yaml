# Common chart values for keycloak

common:
  name: keycloak

  # Disable deployment (external chart creates it)
  deployment:
    enabled: false

  service:
    enabled: false

  # Main UI via Teleport only
  ingress:
    enabled: false

  # External ingress for OIDC (browsers need direct access)
  additionalIngresses:
    - name: auth
      serviceName: keycloak-keycloakx-http
      servicePort: 80
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: auth.lumie-edu.com
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: auth-keycloak-tls
          hosts:
            - auth.lumie-edu.com

  # Realm import ConfigMap
  configMap:
    enabled: true
    name: keycloak-realm-import
    data:
      infra-realm.json: |
        {
          "realm": "infra",
          "enabled": true,
          "displayName": "Lumie Infrastructure",
          "sslRequired": "external",
          "registrationAllowed": false,
          "resetPasswordAllowed": true,
          "bruteForceProtected": true,
          "failureFactor": 5,
          "roles": {
            "realm": [
              {"name": "admin", "description": "Infrastructure administrator"},
              {"name": "developer", "description": "Developer access"}
            ]
          },
          "clients": [
            {
              "clientId": "outline",
              "name": "Outline Wiki",
              "enabled": true,
              "protocol": "openid-connect",
              "publicClient": false,
              "secret": "21285bde638a0a80797839f8be9fa88b5fa76c2ee23c5565",
              "redirectUris": ["https://outline.lumie-infra.com/auth/oidc.callback"],
              "webOrigins": ["https://outline.lumie-infra.com"],
              "standardFlowEnabled": true,
              "directAccessGrantsEnabled": false,
              "defaultClientScopes": ["openid", "profile", "email"]
            }
          ],
          "users": [
            {
              "username": "bluemayne",
              "enabled": true,
              "emailVerified": true,
              "email": "bluemayne@lumie-edu.com",
              "firstName": "Bluemayne",
              "realmRoles": ["admin", "developer"],
              "credentials": [{"type": "password", "value": "changeme", "temporary": true}]
            }
          ]
        }

  # Vault Static Secrets (VSO)
  vaultStaticSecrets:
    # DB credential secret (password for shared infra-db)
    - name: keycloak-db-bootstrap-static
      path: infrastructure/postgresql
      destination:
        name: keycloak-db-bootstrap
        transformation:
          templates:
            username: keycloak
            password: "{{ .Secrets.POSTGRES_PASSWORD }}"
      rolloutRestartTargets:
        - kind: StatefulSet
          name: keycloak

    # Keycloak admin password
    - name: keycloak-secrets-static
      path: infrastructure/keycloak
      destination:
        name: keycloak-secrets
        transformation:
          templates:
            KEYCLOAK_ADMIN_PASSWORD: "{{ .Secrets.KEYCLOAK_ADMIN_PASSWORD }}"
      rolloutRestartTargets:
        - kind: StatefulSet
          name: keycloak

  # CNPG Database disabled - using shared infra-db cluster
  database:
    enabled: false
