apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: rabbitmq
spec:
  replicas: 1
  image: zot.lumie-infra.com/library/rabbitmq:4.1-management

  resources:
    requests:
      cpu: 30m
      memory: 256Mi
    limits:
      memory: 256Mi

  rabbitmq:
    additionalPlugins:
      - rabbitmq_management
      - rabbitmq_prometheus
    additionalConfig: |
      cluster_partition_handling = autoheal
      queue_master_locator = min-masters
      vm_memory_high_watermark.relative = 0.7
      vm_memory_high_watermark_paging_ratio = 0.75
      log.console = true
      log.console.level = info
      load_definitions = /etc/rabbitmq/definitions/definitions.json

  override:
    statefulSet:
      spec:
        template:
          spec:
            volumes:
              - name: definitions
                configMap:
                  name: rabbitmq-definitions
            containers:
              - name: rabbitmq
                volumeMounts:
                  - name: definitions
                    mountPath: /etc/rabbitmq/definitions
                    readOnly: true
