apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lumie-event

resources:
  - ../../base

patches:
  - target:
      kind: RabbitmqCluster
      name: rabbitmq
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/persistence
        value:
          storageClassName: local-path-retain
          storage: 2Gi
      - op: add
        path: /spec/override/statefulSet/spec/template/spec/affinity
        value:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: rabbitmq
                topologyKey: kubernetes.io/hostname
